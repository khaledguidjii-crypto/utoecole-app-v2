{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>{{ 'Modifier' if candidat else 'Ajouter un candidat' }}</h2>
    <form id="candidatForm" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Nom complet</label>
            <input type="text" name="nom" value="{{ candidat.nom if candidat else '' }}" placeholder="ex: Ahmed Benali" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-phone"></i> Téléphone</label>
            <input type="tel" name="telephone" value="{{ candidat.telephone if candidat else '' }}" placeholder="ex: 0555 12 34 56" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-flag-checkered"></i> Phase</label>
            <select name="phase" required>
                <option value="code" {% if candidat and candidat.phase=='code' %}selected{% endif %}>Code</option>
                <option value="creneau" {% if candidat and candidat.phase=='creneau' %}selected{% endif %}>Créneau</option>
                <option value="circuit" {% if candidat and candidat.phase=='circuit' %}selected{% endif %}>Circuit</option>
            </select>
        </div>
        <div class="form-group">
            <label><i class="fas fa-money-bill-wave"></i> Tarif total (DA)</label>
            <input type="number" step="0.01" name="tarif" value="{{ candidat.tarif if candidat else '' }}" placeholder="ex: 25000" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-hand-holding-usd"></i> Versement initial (DA)</label>
            <input type="number" step="0.01" name="versement" value="{{ candidat.versement if candidat else '0' }}" placeholder="ex: 5000">
        </div>
        <div class="form-group">
            <label><i class="fas fa-camera"></i> Photo</label>
            {% if candidat and candidat.photo_url %}
                <div style="margin-bottom: 10px;"><img src="{{ candidat.photo_url }}" width="100" style="border-radius: 16px;"></div>
            {% endif %}
            <input type="file" id="photoInput" name="photo" accept="image/*" capture="environment">
            <div id="progress" style="display:none; margin-top:10px; color:#3b82f6;">Compression en cours...</div>
        </div>
        <button type="submit" id="submitBtn"><i class="fas fa-save"></i> {{ 'Modifier' if candidat else 'Ajouter' }}</button>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('candidatForm');
    const photoInput = document.getElementById('photoInput');
    const progress = document.getElementById('progress');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async function(e) {
        // Si un fichier est sélectionné, on le compresse
        if (photoInput.files && photoInput.files.length > 0) {
            e.preventDefault(); // on bloque l'envoi initial
            const file = photoInput.files[0];
            // Vérifier que c'est une image
            if (!file.type.startsWith('image/')) {
                form.submit(); // soumettre normalement si ce n'est pas une image
                return;
            }
            progress.style.display = 'block';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Compression...';

            try {
                const compressedBlob = await compressImage(file, 800, 0.7);
                // Créer un nouveau File à partir du Blob compressé
                const compressedFile = new File([compressedBlob], file.name, {
                    type: 'image/jpeg',
                    lastModified: Date.now()
                });
                // Remplacer le fichier dans l'input
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(compressedFile);
                photoInput.files = dataTransfer.files;
                progress.textContent = '✅ Compression terminée, envoi...';
                // Soumettre le formulaire
                form.submit();
            } catch (err) {
                console.error('Erreur de compression:', err);
                progress.textContent = '❌ Erreur de compression, envoi sans compression.';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> {{ 'Modifier' if candidat else 'Ajouter' }}';
                // Soumettre sans compression
                form.submit();
            }
        }
        // sinon soumission normale
    });

    /**
     * Compresse une image en utilisant canvas
     * @param {File} file - Fichier image original
     * @param {number} maxWidth - Largeur maximale (pixels)
     * @param {number} quality - Qualité JPEG (0.0 - 1.0)
     * @returns {Promise<Blob>}
     */
    function compressImage(file, maxWidth = 800, quality = 0.7) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    // Redimensionner en gardant le ratio
                    if (width > height) {
                        if (width > maxWidth) {
                            height = Math.round(height * maxWidth / width);
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxWidth) {
                            width = Math.round(width * maxWidth / height);
                            height = maxWidth;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    // Convertir en Blob JPEG compressé
                    canvas.toBlob(function(blob) {
                        if (blob) {
                            resolve(blob);
                        } else {
                            reject(new Error('Échec de la compression'));
                        }
                    }, 'image/jpeg', quality);
                };
                img.onerror = function() {
                    reject(new Error('Erreur de chargement de l\'image'));
                };
                img.src = e.target.result;
            };
            reader.onerror = function() {
                reject(new Error('Erreur de lecture du fichier'));
            };
            reader.readAsDataURL(file);
        });
    }
});
</script>
{% endblock %}
