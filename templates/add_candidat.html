{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2><i class="fas fa-{{ 'edit' if candidat else 'user-plus' }}"></i> {{ 'Modifier' if candidat else 'Nouveau candidat' }}</h2>
    <form method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Nom complet</label>
            <input type="text" name="nom" value="{{ candidat.nom if candidat else '' }}" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-phone"></i> Téléphone</label>
            <input type="tel" name="telephone" value="{{ candidat.telephone if candidat else '' }}" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-flag-checkered"></i> Phase</label>
            <select name="phase">
                <option value="code" {% if candidat and candidat.phase=='code' %}selected{% endif %}>Code</option>
                <option value="creneau" {% if candidat and candidat.phase=='creneau' %}selected{% endif %}>Créneau</option>
                <option value="circuit" {% if candidat and candidat.phase=='circuit' %}selected{% endif %}>Circuit</option>
            </select>
        </div>
        <div class="form-group">
            <label><i class="fas fa-money-bill-wave"></i> Tarif total (DA)</label>
            <input type="number" step="0.01" name="tarif" value="{{ candidat.tarif if candidat else '' }}" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-hand-holding-usd"></i> Versement initial (DA)</label>
            <input type="number" step="0.01" name="versement" value="{{ candidat.versement if candidat else '0' }}">
        </div>
        <div class="form-group">
            <label><i class="fas fa-camera"></i> Photo</label>
            {% if candidat and candidat.photo_url %}
                <div style="margin-bottom: 10px;"><img src="{{ candidat.photo_url }}" width="70" style="border-radius: 50%;"></div>
            {% endif %}
            <input type="file" name="photo" accept="image/*" capture="environment">
        </div>
        <button type="submit"><i class="fas fa-save"></i> Enregistrer</button>
    </form>
</div>
{% endblock %}
