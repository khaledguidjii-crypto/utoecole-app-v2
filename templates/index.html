{% extends "base.html" %}
{% block content %}
<h1><i class="fas fa-users"></i> Candidats</h1>
<input type="text" id="search" placeholder="🔍 Rechercher par nom ou téléphone..." onkeyup="filterCandidats()">
<div class="filters">
    <button onclick="filterPhase('tous')">Tous</button>
    <button onclick="filterPhase('code')">Code</button>
    <button onclick="filterPhase('creneau')">Créneau</button>
    <button onclick="filterPhase('circuit')">Circuit</button>
</div>
<div class="candidat-grid" id="candidatsList">
    {% for c in candidats %}
    <div class="candidat-card" data-phase="{{ c.phase }}" data-nom="{{ c.nom|lower }}" data-tel="{{ c.telephone }}">
        <img src="{{ c.photo_url or 'https://via.placeholder.com/150?text=Photo' }}" alt="Photo">
        <div class="candidat-info">
            <h3>{{ c.nom }}</h3>
            <p><i class="fas fa-phone"></i> {{ c.telephone }}</p>
            <p><i class="fas fa-tag"></i> {{ c.phase|capitalize }}</p>
            <p class="reste"><i class="fas fa-wallet"></i> Reste à payer : {{ "%.2f"|format(c.tarif - c.versement) }} DA</p>
            <a href="/candidat/{{ c.id }}" class="btn-detail"><i class="fas fa-eye"></i> Détails</a>
        </div>
    </div>
    {% endfor %}
</div>
<script>
function filterPhase(phase) {
    let cards = document.querySelectorAll('.candidat-card');
    cards.forEach(card => {
        if(phase === 'tous' || card.dataset.phase === phase)
            card.style.display = 'block';
        else
            card.style.display = 'none';
    });
}
function filterCandidats() {
    let search = document.getElementById('search').value.toLowerCase();
    let cards = document.querySelectorAll('.candidat-card');
    cards.forEach(card => {
        let nom = card.dataset.nom;
        let tel = card.dataset.tel;
        if(nom.includes(search) || tel.includes(search))
            card.style.display = 'block';
        else
            card.style.display = 'none';
    });
}
</script>
{% endblock %}
