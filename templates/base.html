<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Auto École Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav>
        <div class="nav-links">
            <a href="/"><i class="fas fa-home"></i> Accueil</a>
            <a href="/add"><i class="fas fa-user-plus"></i> Ajouter</a>
            <a href="/caisse"><i class="fas fa-coins"></i> Caisse</a>
            <a href="/notifications" id="notif-link">
                <i class="fas fa-bell"></i> Notifications
                <span id="notif-badge" style="display:none;">0</span>
            </a>
        </div>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul class="flash">
                {% for msg in messages %}
                    <li>{{ msg }}</li>
                {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
    <script>
        function updateNotifCount() {
            fetch('/api/notifications/count')
                .then(response => response.json())
                .then(data => {
                    const badge = document.getElementById('notif-badge');
                    if (data.count > 0) {
                        badge.textContent = data.count;
                        badge.style.display = 'inline';
                    } else {
                        badge.style.display = 'none';
                    }
                })
                .catch(err => console.error('Erreur chargement notifications', err));
        }
        updateNotifCount();
        setInterval(updateNotifCount, 30000);
    </script>
</body>
</html>
