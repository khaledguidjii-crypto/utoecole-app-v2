{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2><i class="fas fa-minus-circle"></i> Dépense / Retrait</h2>
    <form method="post">
        <div class="form-group">
            <label>📝 Motif</label>
            <input type="text" name="description" placeholder="Ex: Retrait Khaled, Frais de bureau..." required>
        </div>
        <div class="form-group">
            <label>💰 Montant (DA)</label>
            <input type="number" step="0.01" name="montant" required>
        </div>
        <div class="form-group">
            <label>👤 Employé</label>
            <input type="text" name="employe" placeholder="Khaled, Sawla..." required>
        </div>
        <button type="submit"><i class="fas fa-check"></i> Enregistrer</button>
        <a href="/caisse" style="display: block; text-align: center; margin-top: 1rem; color: var(--gray);">← Retour</a>
    </form>
</div>
{% endblock %}
