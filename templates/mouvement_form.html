{% extends "base.html" %}
{% block content %}
<h2>Ajouter une sortie d'argent</h2>
<form method="post">
    <input type="text" name="description" placeholder="Motif (ex: achat papier, retrait Khaled)" required><br>
    <input type="number" step="0.01" name="montant" placeholder="Montant (DA)" required><br>
    <input type="text" name="employe" placeholder="Employé (Khaled, Sawla, ...)" required><br>
    <button type="submit">Enregistrer</button>
</form>
{% endblock %}
