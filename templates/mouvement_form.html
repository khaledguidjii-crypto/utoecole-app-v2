{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2><i class="fas fa-minus-circle"></i> Enregistrer une sortie d'argent</h2>
    <form method="post">
        <div class="form-group">
            <label>📝 Motif</label>
            <input type="text" name="description" placeholder="ex: Retrait Khaled, Frais de bureau, Carburant..." required>
        </div>
        <div class="form-group">
            <label>💰 Montant (DA)</label>
            <input type="number" step="0.01" name="montant" placeholder="ex: 2000" required>
        </div>
        <div class="form-group">
            <label>👤 Employé</label>
            <input type="text" name="employe" placeholder="Khaled, Sawla, ..." required>
        </div>
        <button type="submit"><i class="fas fa-check"></i> Enregistrer</button>
        <a href="/caisse" class="btn-secondary" style="display: inline-block; margin-top: 1rem; background:#64748b; color:white; padding:0.8rem 1rem; border-radius:16px; text-decoration:none;">← Retour à la caisse</a>
    </form>
</div>
{% endblock %}
