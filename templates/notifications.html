{% extends "base.html" %}
{% block content %}
<h1><i class="fas fa-bell"></i> Notifications</h1>
{% if notifications %}
    {% for n in notifications %}
    <div class="notif-item">
        <p><i class="fas fa-info-circle"></i> {{ n.message }}</p>
        <small><i class="fas fa-clock"></i> {{ n.created_at[:19] }}</small>
        {% if n.lien %}
            <br><a href="{{ n.lien }}" class="btn-detail" style="margin-top: 8px; display: inline-block;">Voir <i class="fas fa-arrow-right"></i></a>
        {% endif %}
    </div>
    {% endfor %}
{% else %}
    <div class="card"><p><i class="fas fa-check-circle"></i> Aucune nouvelle notification</p></div>
{% endif %}
{% endblock %}
